<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1ec8ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#05080b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1ec8ff"/>
      <stop offset="100%" stop-color="#0a3040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#05080b"/>

  <!-- Radar glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1ec8ff" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#1ec8ff" stroke-width="2" opacity="0.25"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#1ec8ff" stroke-width="2" opacity="0.15"/>

  <!-- Crosshair -->
  <line x1="76" y1="256" x2="436" y2="256" stroke="url(#cross)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="76" x2="256" y2="436" stroke="url(#cross)" stroke-width="2" opacity="0.5"/>

  <!-- Diagonal scan lines -->
  <line x1="96" y1="96" x2="416" y2="416" stroke="#1ec8ff" stroke-width="1" opacity="0.15"/>
  <line x1="416" y1="96" x2="96" y2="416" stroke="#1ec8ff" stroke-width="1" opacity="0.15"/>

  <!-- Center diamond -->
  <polygon points="256,180 300,256 256,332 212,256" fill="none" stroke="#1ec8ff" stroke-width="3" opacity="0.8"/>

  <!-- Corner brackets -->
  <path d="M80,140 L80,80 L140,80" fill="none" stroke="#1ec8ff" stroke-width="4" opacity="0.6"/>
  <path d="M372,80 L432,80 L432,140" fill="none" stroke="#1ec8ff" stroke-width="4" opacity="0.6"/>
  <path d="M432,372 L432,432 L372,432" fill="none" stroke="#1ec8ff" stroke-width="4" opacity="0.6"/>
  <path d="M140,432 L80,432 L80,372" fill="none" stroke="#1ec8ff" stroke-width="4" opacity="0.6"/>

  <!-- Target dot -->
  <circle cx="256" cy="256" r="8" fill="#1ec8ff" opacity="0.9"/>
  <circle cx="256" cy="256" r="4" fill="#05080b"/>

  <!-- Small data pips -->
  <circle cx="160" cy="200" r="3" fill="#1ec8ff" opacity="0.5"/>
  <circle cx="350" cy="180" r="3" fill="#1ec8ff" opacity="0.4"/>
  <circle cx="180" cy="340" r="3" fill="#1ec8ff" opacity="0.3"/>
  <circle cx="340" cy="330" r="3" fill="#1ec8ff" opacity="0.5"/>
</svg>
